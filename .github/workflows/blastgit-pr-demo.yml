name: Blastgit PR Demo

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, edited, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to render
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: blastgit-pr-demo-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: true

jobs:
  render-demo:
    name: Render PR demo video
    if: github.event_name != 'pull_request' || github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Resolve PR metadata
        id: meta
        uses: actions/github-script@v8
        with:
          script: |
            const prNumberInput = core.getInput('pr_number');
            const prNumber = context.payload.pull_request?.number ?? (prNumberInput ? Number(prNumberInput) : null);
            if (!prNumber || Number.isNaN(prNumber)) {
              core.setFailed('Missing pull request number');
              return;
            }

            const { owner, repo } = context.repo;
            const { data: pr } = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: prNumber,
            });

            core.setOutput('pr_number', String(prNumber));
            core.setOutput('pr_title', String(pr.title || ''));

      - name: Install UI dependencies
        working-directory: ui
        shell: bash
        run: |
          npm ci
          npm install --no-save playwright

      - name: Install browser dependencies
        working-directory: ui
        shell: bash
        run: |
          npx playwright install --with-deps chromium

      - name: Start UI dev server
        working-directory: ui
        shell: bash
        run: |
          VITE_API_PROXY_TARGET=https://api.traceway.ai npm run dev -- --host 127.0.0.1 --port 4173 > /tmp/blastgit-demo-server.log 2>&1 &
          echo $! > /tmp/blastgit-demo-server.pid

      - name: Wait for app
        shell: bash
        run: |
          for i in $(seq 1 120); do
            if curl -fsS http://127.0.0.1:4173/ >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "Dev server never became ready"
          cat /tmp/blastgit-demo-server.log || true
          exit 1

      - name: Capture real UI demo
        working-directory: ui
        env:
          DEMO_URL: http://127.0.0.1:4173/
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          OUT_WEBM: ${{ github.workspace }}/pr-demo.webm
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const crypto = require("node:crypto");
          const { chromium } = require("playwright");

          async function gotoFirstReachable(page, urls) {
            for (const url of urls) {
              try {
                await page.goto(url, { waitUntil: "domcontentloaded", timeout: 45000 });
                await page.waitForTimeout(1200);
                return url;
              } catch {
                // Try next path.
              }
            }
            throw new Error("No reachable demo route");
          }

          async function ensureAuthenticated(page, base) {
            const runTag = Date.now().toString(36);
            const email = `blastgit-demo+${runTag}-${crypto.randomBytes(3).toString("hex")}@example.com`;
            const password = `Traceway!${Date.now()}Aa`;

            await page.goto(`${base}signup`, { waitUntil: "domcontentloaded", timeout: 60000 });
            await page.waitForSelector("input#email", { timeout: 30000 });

            await page.locator("input#name").fill("Blastgit Demo Bot");
            await page.locator("input#org-name").fill(`Blastgit Demo ${runTag}`);
            await page.locator("input#email").fill(email);
            await page.locator("input#password").fill(password);
            await page.locator("button[type='submit']").click();

            try {
              await page.waitForFunction(
                () => !["/signup", "/login"].includes(window.location.pathname),
                { timeout: 45000 }
              );
            } catch (error) {
              const currentPath = new URL(page.url()).pathname;
              const body = await page.locator("body").innerText().catch(() => "");
              throw new Error(
                `Auth did not complete (stuck on ${currentPath}). Body snippet: ${body.slice(0, 280)}`
              );
            }

            await page.waitForTimeout(1200);
          }

          async function visitRoutes(page, base, prTitle, prNumber) {
            const routes = ["/", "/review", "/approvals", "/traces"];
            for (const route of routes) {
              try {
                await page.goto(`${base}${route.slice(1)}`, { waitUntil: "domcontentloaded", timeout: 45000 });
                const redirectedToAuth = await page.evaluate(() =>
                  ["/login", "/signup"].includes(window.location.pathname)
                );
                if (redirectedToAuth) {
                  throw new Error(`Auth session lost while visiting ${route}`);
                }
                await page.waitForTimeout(800);
              } catch (error) {
                if (error instanceof Error && error.message.includes("Auth session lost")) {
                  throw error;
                }
                // Continue through best-effort route walkthrough.
              }
            }

            const prLabel = `#${prNumber || ""}`.trim();
            const hoverCandidates = [
              `[data-pr-number='${prNumber}']`,
              `a:has-text("${prLabel}")`,
              `a:has-text("${prTitle}")`,
              `text=${prLabel}`,
              "a,button,[role='button']"
            ];

            for (const selector of hoverCandidates) {
              const match = page.locator(selector).first();
              if (await match.count()) {
                const box = await match.boundingBox();
                if (box) {
                  await page.mouse.move(box.x + box.width / 2, box.y + box.height / 2);
                  await page.waitForTimeout(900);
                  break;
                }
              }
            }
          }

          (async () => {
            const outWebm = process.env.OUT_WEBM;
            const base = process.env.DEMO_URL;
            const prTitle = (process.env.PR_TITLE || "").trim();
            const prNumber = (process.env.PR_NUMBER || "").trim();
            const browser = await chromium.launch({ headless: true });
            const context = await browser.newContext({
              viewport: { width: 1280, height: 720 },
              recordVideo: {
                dir: process.cwd(),
                size: { width: 1280, height: 720 },
              },
            });
            const page = await context.newPage();
            await gotoFirstReachable(page, [base, `${base}signup`, `${base}login`, `${base}traces`, `${base}docs`]);
            await ensureAuthenticated(page, base);
            await visitRoutes(page, base, prTitle, prNumber);

            await page.evaluate(() => window.scrollTo({ top: 420, behavior: "smooth" }));
            await page.waitForTimeout(800);
            await page.evaluate(() => window.scrollTo({ top: 980, behavior: "smooth" }));
            await page.waitForTimeout(800);
            await page.evaluate(() => window.scrollTo({ top: 0, behavior: "smooth" }));
            await page.waitForTimeout(2200);

            const video = page.video();
            await context.close();
            await browser.close();
            if (!video) throw new Error("No video captured");
            const path = await video.path();
            fs.copyFileSync(path, outWebm);
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Ensure ffmpeg is available
        shell: bash
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi

      - name: Convert demo to mp4
        shell: bash
        run: |
          ffmpeg -y -i pr-demo.webm -c:v libx264 -pix_fmt yuv420p -movflags +faststart pr-demo.mp4

      - name: Stop dev server
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/blastgit-demo-server.pid ]; then
            kill "$(cat /tmp/blastgit-demo-server.pid)" >/dev/null 2>&1 || true
          fi

      - name: Upload server log (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-server-log
          path: /tmp/blastgit-demo-server.log

      - name: Upload demo artifact
        uses: actions/upload-artifact@v7
        with:
          name: blastgit-pr-demo-video
          path: pr-demo.mp4
          retention-days: 30
